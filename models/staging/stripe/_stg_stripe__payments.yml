models:
- name: stg_stripe__payments
  description: one payment per row
  columns:
  - name: payment_id
    description: A unique identifier for each payment transaction. Primary key.
    data_tests:
      - unique
      - not_null
  - name: order_id
    description: The identifier for the order associated with the payment.
    data_tests:
      - not_null
  - name: payment_method
    description: "{{ doc('payment_method') }}"
    data_tests:
      - not_null
  - name: payment_status
    description: "{{ doc('payment_status') }}"
    data_tests:
      - not_null
  - name: payment_amount
    description: The total amount of the payment transaction.
    data_tests:
      - not_null
  - name: payment_created
    description: The date when the payment was created.
    data_tests:
      - not_null
  - name: _batched_at
    description: The datetime when the payment data was batched for processing.
    data_tests:
      - not_null
