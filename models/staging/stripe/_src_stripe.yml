sources:
  - name: stripe
    database: dbt-tutorial
    schema: stripe
    description: a clone of a Postgres application database
    tables:
      - name: payment
        description: raw payment data
        config:
          loaded_at_field: _batched_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 24, period: hour}